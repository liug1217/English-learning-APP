<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=440, user-scalable=no, viewport-fit=cover">
<title>英文學習APP</title>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
<style>
/* ===== 你的原本CSS全部保留 ===== */
</style>
</head>
<body>

<!-- ===== 你的原本HTML畫面全部保留 ===== -->

<script>
const authScreen = document.getElementById('auth-screen');
const app = document.getElementById('app-content');
const stage = document.getElementById('stage-screen');
const btnToday = document.getElementById('btn-today');
const poolContainer = document.getElementById('word-pool');
const answerArea = document.getElementById('answer-area');
const progressBar = document.getElementById('progress-bar');
const progressText = document.getElementById('progress-text');
const chineseLabel = document.getElementById('chinese-text');
const header = document.getElementById('sticky-header');


// 🔥 改成從 Python 讀取題庫
let database = [];

async function loadDatabase() {
    try {
        const response = await fetch("/api/questions");
        database = await response.json();
        console.log("題庫載入成功", database);
    } catch (error) {
        console.error("題庫載入失敗", error);
        alert("無法載入題庫");
    }
}

window.onload = function () {
    loadDatabase();  // 🔥 啟動時先讀取 Python 題庫
};

let currentSessionQuestions = [];
let currentIndex = 0;

function shuffle(array) {
    for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
    return array;
}

function loadQuestion() {
    const currentData = currentSessionQuestions[currentIndex];
    chineseLabel.innerText = currentData.q;
    poolContainer.innerHTML = '';

    const shuffledWords = shuffle([...currentData.a]);
    shuffledWords.forEach(function(word) {
        const tile = document.createElement('div');
        tile.className = 'word-tile';
        tile.innerText = word;
        tile.onclick = function() {
            createAnswerTile(word, tile);
            tile.classList.add('used');
        };
        poolContainer.appendChild(tile);
    });

    updateProgressUI();
}

function createAnswerTile(word, originalTile) {
    const answerTile = document.createElement('div');
    answerTile.className = 'word-tile';
    answerTile.innerText = word;
    answerTile.onclick = function() {
        answerTile.remove();
        originalTile.classList.remove('used');
    };
    answerArea.appendChild(answerTile);
}

function updateProgressUI() {
    const percent = (currentIndex / 5) * 100;
    progressBar.style.width = percent + '%';
    progressText.innerText = currentIndex + '/5';
}

btnToday.addEventListener('click', function() {
    if (database.length === 0) {
        alert("題庫尚未載入完成");
        return;
    }

    currentSessionQuestions = shuffle([...database]).slice(0, 5);
    currentIndex = 0;
    app.style.display = 'none';
    stage.style.display = 'block';
    loadQuestion();
});

function nextQuestion() {
    currentIndex++;
    if (currentIndex < 5) loadQuestion();
    else {
        progressBar.style.width = '100%';
        progressText.innerText = '5/5';
        alert("恭喜完成今日 5 題練習！");
        stage.style.display = 'none';
        app.style.display = 'block';
    }
}

function checkFinal() {
    const current = Array.from(answerArea.querySelectorAll('.word-tile')).map(t => t.innerText);
    const target = currentSessionQuestions[currentIndex].a;

    if (current.join(" ") === target.join(" ")) {
        nextQuestion();
    } else {
        alert("順序有誤！");
    }
}

</script>
</body>
</html>
