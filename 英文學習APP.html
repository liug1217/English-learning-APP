<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#212121">

    <style>
        /* 徹底關閉滾動條預留空間 */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #212121;
            position: fixed; 
            overflow: hidden !important; /* 禁止任何滾動計算 */
            scrollbar-width: none;       /* 標準隱藏滾動條 */
            -ms-overflow-style: none;    /* IE 隱藏 */
        }

        /* Chrome/Safari 徹底移除滾動條佔位 */
        ::-webkit-scrollbar {
            display: none !important;
            width: 0 !important;
        }

        .frame {
            position: relative;
            width: 440px; /* 設計基準寬度 */
            height: 956px;
            background-color: #212121;
            
            /* 使用 100% 進行縮放，避開 100vw 包含滾動條的誤差 */
            /* transform-origin 設為 top center 確保置中放大 */
            transform: scale(calc(100% / 440));
            transform-origin: top center;
            
            /* 讓框架本身也在螢幕水平置中 */
            margin: 0 auto; 
        }

        /* Rectangle 1 - 頂部背景 */
        .rectangle-1 {
            position: absolute;
            width: 440px; 
            height: 145px;
            left: 50%;
            transform: translateX(-50%);
            top: 0px;
            background: rgba(53, 53, 53, 0.2);
            box-shadow: 0px 4px 4px rgba(0, 0, 0, 0.25);
            z-index: 1;
        }

        /* S__3588120 1 - 大頭貼圖片 */
        .s-3588120-1 {
            position: absolute;
            width: 60px;
            height: 60px;
            left: 50%;
            transform: translateX(-50%);
            top: 60px;
            background: url('https://raw.githubusercontent.com/liug1217/Group/682c1e79d519a3ce8ea245a2b0f9120ddce9fe28/S__3588120.jpg');
            background-size: cover;
            background-position: center;
            filter: drop-shadow(0px 4px 4px rgba(0, 0, 0, 0.25));
            border-radius: 30px;
            z-index: 2;
        }

        /* Rectangle 13 - 內容卡片 */
        .rectangle-13 {
            position: absolute;
            width: 400px;
            height: 150px;
            left: 50%;
            transform: translateX(-50%);
            top: 165px;
            background: rgba(65, 65, 65, 0.2);
            box-shadow: 0px 4px 4px rgba(0, 0, 0, 0.25);
            border-radius: 35px;
            z-index: 2;
        }
    </style>
</head>
<body>

    <div class="frame">
        <div class="rectangle-1"></div>
        <div class="s-3588120-1"></div>
        <div class="rectangle-13"></div>
    </div>

</body>
</html>
